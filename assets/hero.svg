<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="COURIER — Turn your own WhatsApp into a private command-and-notification channel for your automations.">
  <defs>
    <style>
      :root { color-scheme: light dark; }
      .bg    { fill: #0A0D12; }
      .grid  { stroke: #25D366; stroke-opacity: .07; }
      .title { fill: #E6EDF3; font-family: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace; font-weight: 700; }
      .tag   { fill: #8B98A5; font-family: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace; }
      .accent{ fill: #25D366; }
      .chip  { fill: #11151d; stroke: #1e2733; }
      .chipt { fill: #8B98A5; font-family: ui-monospace,monospace; }
      @media (prefers-color-scheme: light) {
        .bg { fill: #EEF3F1; } .title { fill: #0F1720; } .tag { fill: #4d5b57; }
        .chip { fill: #ffffff; stroke: #dbe4df; } .chipt { fill: #4d5b57; } .grid { stroke-opacity: .10; }
      }
    </style>
    <pattern id="g" width="44" height="44" patternUnits="userSpaceOnUse">
      <path class="grid" d="M44 0H0V44" fill="none" stroke-width="1"/>
    </pattern>
  </defs>

  <rect class="bg" width="1200" height="340"/>
  <rect width="1200" height="340" fill="url(#g)"/>

  <!-- accent bar -->
  <rect class="accent" x="72" y="120" width="6" height="100" rx="3"/>

  <!-- eyebrow -->
  <text class="accent" x="98" y="108" font-family="ui-monospace,monospace" font-size="15" letter-spacing="6" font-weight="600">PERSONAL WHATSAPP COMMAND CHANNEL</text>

  <!-- title -->
  <text class="title" x="96" y="188" font-size="76">📩 COURIER</text>

  <!-- tagline -->
  <text class="tag" x="98" y="232" font-size="22">Turn your own WhatsApp into a private command-and-notification channel for your automations.</text>

  <!-- chips -->
  <rect class="chip" x="96" y="272" width="89" height="30" rx="15"/>
  <text class="chipt" x="109" y="292" font-size="13">whatsapp</text>
  <rect class="chip" x="197" y="272" width="114" height="30" rx="15"/>
  <text class="chipt" x="210" y="292" font-size="13">self-hosted</text>
  <rect class="chip" x="324" y="272" width="148" height="30" rx="15"/>
  <text class="chipt" x="337" y="292" font-size="13">no-business-api</text>
  <rect class="chip" x="484" y="272" width="131" height="30" rx="15"/>
  <text class="chipt" x="497" y="292" font-size="13">notifications</text>
  <rect class="chip" x="627" y="272" width="148" height="30" rx="15"/>
  <text class="chipt" x="640" y="292" font-size="13">command-channel</text>
</svg>
